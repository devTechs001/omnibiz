# Netlify Configuration for OmniBiz
# Root netlify.toml - Netlify builds from root directory

[build]
  # Build command - install client deps and build
  command = "cd client && npm install && npm run build"

  # Publish directory (output of build)
  publish = "client/dist"

[build.environment]
  # Node version - using LTS
  NODE_VERSION = "20"

  # API URL (Render backend)
  VITE_API_URL = "https://omnibiz.onrender.com"
  VITE_SOCKET_URL = "https://omnibiz.onrender.com"

  # Production frontend URL
  URL = "https://bizsolutionz.netlify.app"

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
